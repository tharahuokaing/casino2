<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Cyber Casino - 11 Game Deck</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="casino-container">
        <header>
            <h1>🎰 CASINO ROYALE 🎰</h1>
        </header>

        <!-- Dynamic Game Scroller Navigation -->
        <div class="game-nav">
            <button class="nav-btn active" id="tab-slots">Slots</button>
            <button class="nav-btn" id="tab-coin">Coin Flip</button>
            <button class="nav-btn" id="tab-crash">Crash</button>
            <button class="nav-btn" id="tab-roulette">Roulette</button>
            <button class="nav-btn" id="tab-rps">RPS</button>
            <button class="nav-btn" id="tab-mines">Mines</button>
            <button class="nav-btn" id="tab-blackjack">Blackjack</button>
            <button class="nav-btn" id="tab-baccarat">Baccarat</button>
            <button class="nav-btn" id="tab-dice">Dice</button>
            <button class="nav-btn" id="tab-wheel">Wheel</button>
            <button class="nav-btn" id="tab-plinko">Plinko</button>
        </div>

        <!-- Master Statistics Dashboard -->
        <div class="dashboard">
            <div class="display-box">
                <span class="label">Balance</span>
                <span id="balance-display">$1,000</span>
            </div>
            <div class="display-box">
                <span class="label">Current Bet</span>
                <span id="bet-display">$10</span>
            </div>
            <div class="display-box">
                <span class="label">Last Win</span>
                <span id="win-display">$0</span>
            </div>
        </div>

        <!-- SYSTEM AUDIO HARDWARE MODULE -->
        <div class="audio-hardware-controller">
            <div class="audio-track-info">
                <div class="audio-spectrometer">
                    <span class="spectro-bar"></span>
                    <span class="spectro-bar"></span>
                    <span class="spectro-bar"></span>
                    <span class="spectro-bar"></span>
                </div>
                <span id="current-track-title">CC_V7_AMBIENT.MP3</span>
            </div>
            
            <div class="audio-controls-group">
                <!-- Hidden audio element for background looping -->
                <audio id="core-bg-sound" loop src="assets/audio/ambient_matrix.mp3"></audio>
                
                <button id="btn-audio-toggle" class="audio-node-btn" onclick="toggleSystemAudio()">
                    <span class="audio-icon">▶</span>
                </button>
                
                <div class="volume-slider-container">
                    <input type="range" id="sys-volume" min="0" max="100" value="50" oninput="adjustSystemVolume(this.value)">
                </div>
            </div>
        </div>

        <!-- GAME CONTAINER REGIONS -->
        
        <!-- GAME 1: Slots Engine Layout -->
        <div id="slots-arena" class="game-window">
            <div class="game-card">
                <div class="arena-display-box">
                    <div class="reel" id="reel1">🍒</div>
                    <div class="reel" id="reel2">🍋</div>
                    <div class="reel" id="reel3">🍊</div>
                </div>
            </div>
        </div>

        <!-- GAME 2: Coin Flip Engine Layout -->
        <div id="coin-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box">
                    <div class="coin-graphic" id="coin-element">🪙</div>
                </div>
                <div class="input-selection-group">
                    <label class="radio-label"><input type="radio" name="coin-choice" value="Heads" checked> Heads</label>
                    <label class="radio-label"><input type="radio" name="coin-choice" value="Tails"> Tails</label>
                </div>
            </div>
        </div>

        <!-- GAME 3: Crash Multiplier Engine Layout -->
        <div id="crash-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box matrix-bg">
                    <div id="crash-multiplier-output">1.00x</div>
                </div>
                <div class="input-selection-group">
                    <button class="btn btn-danger hidden" id="btn-crash-cashout">CASH OUT</button>
                </div>
            </div>
        </div>

        <!-- GAME 4: Roulette Engine Layout -->
        <div id="roulette-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box wheel-bg">
                    <div id="roulette-ball-output">00</div>
                </div>
                <div class="input-selection-group">
                    <span class="text-label-inline">Pick Target Number (0-36):</span>
                    <input type="number" id="roulette-target-input" min="0" max="36" value="7">
                </div>
            </div>
        </div>

        <!-- GAME 5: Rock Paper Scissors Engine Layout -->
        <div id="rps-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box split-display">
                    <div>🧑 <span id="rps-player-node">?</span></div>
                    <div>🤖 <span id="rps-computer-node">?</span></div>
                </div>
                <div class="input-selection-group">
                    <label class="radio-label"><input type="radio" name="rps-choice" value="Rock" checked> ✊ Rock</label>
                    <label class="radio-label"><input type="radio" name="rps-choice" value="Paper"> 🫱 Paper</label>
                    <label class="radio-label"><input type="radio" name="rps-choice" value="Scissors"> ✌️ Scissors</label>
                </div>
            </div>
        </div>

        <!-- GAME 6: Mines Grid Engine Layout -->
        <div id="mines-arena" class="game-window hidden">
            <div class="game-card">
                <div class="mines-grid" id="mines-board">
                    <!-- Javascript builds dynamically (3x3 tactical space) -->
                </div>
                <div class="input-selection-group">
                    <button class="btn btn-danger hidden" id="btn-mines-cashout">CASH OUT MINES</button>
                </div>
            </div>
        </div>

        <!-- GAME 7: Simplified Blackjack Deck Layout -->
        <div id="blackjack-arena" class="game-window hidden">
            <div class="game-card">
                <div class="bj-display">
                    <div class="bj-row">🤖 Dealer: <span id="bj-dealer-score">0</span> <div class="card-row" id="bj-dealer-cards"></div></div>
                    <div class="bj-row">🧑 Player: <span id="bj-player-score">0</span> <div class="card-row" id="bj-player-cards"></div></div>
                </div>
                <div class="input-selection-group hidden" id="bj-action-group">
                    <button class="btn btn-secondary" id="btn-bj-hit">HIT</button>
                    <button class="btn btn-secondary" id="btn-bj-stand">STAND</button>
                </div>
            </div>
        </div>

        <!-- GAME 11: NEO-BACCARAT CYBER-SUITE -->
        <div id="baccarat-arena" class="game-window hidden">
            <div class="game-card">
                <!-- Mini Status Header -->
                <div class="bj-row" style="margin-bottom: 12px; display: flex; justify-content: space-between;">
                    <span>TABLE #07 // DECK-MATRIX: 8</span>
                    <div class="status-indicator"></div>
                </div>

                <!-- Baccarat Table Arena Grid -->
                <div class="arena-display-box baccarat-table">
                    <!-- Player Sector -->
                    <div class="baccarat-sector player-sector">
                        <div class="sector-label">PLAYER <span id="bac-player-score" class="score-badge">0</span></div>
                        <div id="bac-player-cards" class="card-row">
                            <div class="bj-card-element">?</div>
                        </div>
                    </div>

                    <!-- Center Divider Laser Vector -->
                    <div class="table-vector-line"></div>

                    <!-- Banker Sector -->
                    <div class="baccarat-sector banker-sector">
                        <div class="sector-label">BANKER <span id="bac-banker-score" class="score-badge">0</span></div>
                        <div id="bac-banker-cards" class="card-row">
                            <div class="bj-card-element">?</div>
                        </div>
                    </div>
                </div>

                <!-- Dynamic Trend Analytics (Big Road Emulation Matrix) -->
                <div class="baccarat-trend-bar">
                    <span class="label">TREND LOGGER:</span>
                    <div id="bac-trend-history" class="trend-grid">
                        <span class="trend-dot player">P</span>
                        <span class="trend-dot banker">B</span>
                        <span class="trend-dot tie">T</span>
                    </div>
                </div>

                <!-- Tactical Target Allocation Selection Group -->
                <div class="input-selection-group baccarat-bet-zones">
                    <input type="radio" id="bac-bet-player" name="bac-target" value="PLAYER" checked hidden>
                    <label for="bac-bet-player" class="bet-zone-btn player-zone">
                        <span class="zone-name">PLAYER</span>
                        <span class="payout-ratio">1 : 1</span>
                    </label>

                    <input type="radio" id="bac-bet-tie" name="bac-target" value="TIE" hidden>
                    <label for="bac-bet-tie" class="bet-zone-btn tie-zone">
                        <span class="zone-name">TIE</span>
                        <span class="payout-ratio">8 : 1</span>
                    </label>

                    <input type="radio" id="bac-bet-banker" name="bac-target" value="BANKER" hidden>
                    <label for="bac-bet-banker" class="bet-zone-btn banker-zone">
                        <span class="zone-name">BANKER</span>
                        <span class="payout-ratio">0.95 : 1</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- GAME 8: High-Low Math Dice Roller Layout -->
        <div id="dice-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box matrix-bg">
                    <div id="dice-result-output">--</div>
                </div>
                <div class="input-selection-group">
                    <label class="radio-label"><input type="radio" name="dice-choice" value="Over" checked> Roll Over 50</label>
                    <label class="radio-label"><input type="radio" name="dice-choice" value="Under"> Roll Under 50</label>
                </div>
            </div>
        </div>

        <!-- GAME 9: Multi-Multiplier Risk Wheel Layout -->
        <div id="wheel-arena" class="game-window hidden">
            <div class="game-card">
                <div class="arena-display-box wheel-bg pointer-indicator">
                    <div id="wheel-spinner-output" style="transition: transform 1.5s cubic-bezier(0.1, 0.8, 0.1, 1);">🎡</div>
                </div>
            </div>
        </div>

        <!-- GAME 10: Horizontal Cascade Plinko Layout -->
        <div id="plinko-arena" class="game-window hidden">
            <div class="game-card">
                <div class="plinko-pyramid" id="plinko-display-board">
                    <!-- Drop simulation rows -->
                    <div class="plinko-node">●</div>
                </div>
            </div>
        </div>

        <!-- System Message Box Display -->
        <div class="message-container">
            <p id="system-message">Select a gaming layout and enter your parameters...</p>
        </div>

        <!-- Global Operational Mechanics Controls -->
        <div class="controls">
            <div class="bet-adjusters">
                <button class="btn btn-secondary" id="btn-decrease-bet">- Decrease</button>
                <button class="btn btn-secondary" id="btn-increase-bet">+ Increase</button>
            </div>
            <button class="btn btn-primary" id="btn-action">SPIN REELS</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="script1.js"></script>
    <script src="script2.js"></script>
    <script src="script3.js"></script>
    <script src="script4.js"></script>
</body>
</html>
